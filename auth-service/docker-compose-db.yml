version: "3.9"

services:
  auth-service-db:
    container_name: auth-service-db
    image: postgres:latest
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    ports:
      - "5001:5432"
    volumes:
      - "D:/db_volumes/auth-service-db:/var/lib/postgresql"
    networks:
      - internal

networks:
  internal:
    external: true

