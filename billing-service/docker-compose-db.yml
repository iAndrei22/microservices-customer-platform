version: "3.9"

services:
  billing-service-db:
    container_name: billing-service-db
    image: postgres:latest
    environment:
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: db
    ports:
      - "5002:5432"
    volumes:
      - "D:/db_volumes/billing-service-db:/var/lib/postgresql"
    networks:
      - internal

networks:
  internal:
    external: true

